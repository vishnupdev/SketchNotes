<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Editor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #273449;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #60a5fa;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #111827 60%, #0f172a);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(17,24,39,.92);
      backdrop-filter: blur(10px);
    }
    .toolbar .left, .toolbar .right { display: flex; align-items: center; gap: 10px; }
    .title {
      font-weight: 700;
      letter-spacing: .02em;
      color: #f8fafc;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #334155; }
    button.primary { background: var(--accent); color: #052e16; border-color: transparent; }
    button.primary:hover { filter: brightness(1.04); }
    .app {
      flex: 1;
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 0;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(15,23,42,.92);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar .label {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 6px;
    }
    .file {
      width: 100%;
      text-align: left;
      color: var(--muted);
      border: 1px solid transparent;
      background: transparent;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .file.active {
      color: var(--text);
      background: rgba(96,165,250,.16);
      border-color: rgba(96,165,250,.28);
    }
    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg);
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 0 12px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 8px 12px;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      border-radius: 0;
    }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent-2);
      background: rgba(96,165,250,.1);
    }
    .editor-shell {
      flex: 1;
      display: grid;
      grid-template-columns: 48px 1fr;
      min-height: 0;
      background: #020617;
    }
    .line-numbers {
      padding: 12px 8px 12px 10px;
      text-align: right;
      color: #64748b;
      font: 14px/1.55 Consolas, "Courier New", monospace;
      user-select: none;
      border-right: 1px solid var(--border);
      overflow: hidden;
      background: rgba(2,6,23,.95);
    }
    textarea {
      width: 100%;
      min-height: 0;
      border: 0;
      resize: none;
      outline: none;
      background: transparent;
      color: #e2e8f0;
      font: 14px/1.55 Consolas, "Courier New", monospace;
      line-height: 1.55;
      padding: 12px 14px;
      tab-size: 2;
    }
    .status {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: rgba(15,23,42,.96);
    }
    .output {
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
      background: rgba(2,6,23,.96);
      max-height: 220px;
      overflow: auto;
    }
    .output pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e1;
      font: 13px/1.55 Consolas, "Courier New", monospace;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="left">
      <div class="title">Code Editor</div>
      <span class="status-pill">HTML · JS · CSS</span>
    </div>
    <div class="right">
      <button id="saveBtn">Save</button>
      <button class="primary" id="runBtn">Run</button>
    </div>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="label">Explorer</div>
      <button class="file active" data-file="index.html">index.html</button>
      <button class="file" data-file="main.js">main.js</button>
      <button class="file" data-file="styles.css">styles.css</button>
    </aside>
    <section class="main">
      <div class="tabs">
        <button class="tab active" data-file="index.html">index.html</button>
        <button class="tab" data-file="main.js">main.js</button>
        <button class="tab" data-file="styles.css">styles.css</button>
      </div>
      <div class="editor-shell">
        <div class="line-numbers" id="lineNumbers"></div>
        <textarea id="editor" spellcheck="false" aria-label="Code editor"></textarea>
      </div>
      <div class="output">
        <pre id="output">Click Run to execute the current script.</pre>
      </div>
      <div class="status" id="status">Unsaved changes can be downloaded from the Save button.</div>
    </section>
  </div>
  <script>
    const files = {
      'index.html': `<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sample page</title>
  </head>
  <body>
    <h1>Hello from the editor</h1>
    <script src="./main.js"><\/script>
  </body>
</html>`,
      'main.js': `const heading = document.querySelector('h1');
if (heading) {
  heading.textContent = 'Hello from the editor';
  heading.style.color = '#22c55e';
}`,
      'styles.css': `body {
  font-family: Arial, sans-serif;
  padding: 2rem;
  background: #f8fafc;
  color: #0f172a;
}`
    };

    const editor = document.getElementById('editor');
    const lineNumbers = document.getElementById('lineNumbers');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const fileButtons = document.querySelectorAll('.file, .tab');
    let activeFile = 'index.html';

    function renderLineNumbers() {
      const value = editor.value || '';
      const lines = value.split('\n').length;
      lineNumbers.innerHTML = Array.from({ length: lines }, (_, i) => `<div>${i + 1}</div>`).join('');
    }

    function setActiveFile(name) {
      activeFile = name;
      editor.value = files[name] || '';
      renderLineNumbers();
      status.textContent = `${name} ready to edit`;
      fileButtons.forEach(btn => {
        const isMatch = btn.getAttribute('data-file') === name;
        btn.classList.toggle('active', isMatch);
      });
    }

    editor.addEventListener('input', () => {
      files[activeFile] = editor.value;
      renderLineNumbers();
      status.textContent = `${activeFile} • unsaved changes`;
    });

    fileButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveFile(btn.getAttribute('data-file'));
      });
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const blob = new Blob([files[activeFile]], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = activeFile;
      link.click();
      URL.revokeObjectURL(link.href);
      status.textContent = `${activeFile} downloaded`;
    });

    document.getElementById('runBtn').addEventListener('click', () => {
      try {
        const source = files['main.js'];
        const fn = new Function(source);
        fn();
        output.textContent = 'Execution succeeded.\n' + source;
      } catch (error) {
        output.textContent = `Error: ${error.message}`;
      }
    });

    editor.addEventListener('scroll', () => {
      lineNumbers.scrollTop = editor.scrollTop;
    });

    setActiveFile('index.html');
  </script>
</body>
</html>
